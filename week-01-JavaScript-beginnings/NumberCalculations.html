<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Number Calculations</title>
  <meta name="author" content="Paul Ezennolim">
</head>

<body>
  <script>
    // Function to perform calculations and display results
    function performCalculations() {
      // Read two numbers (x and y) from the user
      var x = prompt("Enter the first number (x):");
      var y = prompt("Enter the second number (y):");

      // Check if the inputs are valid numbers
      if (isNaN(x)) {
        alert("Invalid input. Please enter valid numbers.");
        return;
      } else if (isNaN(y)) {
        alert("Invalid input. Please enter a valid number.");
        return;
      }

      // Convert input values to numbers
      x = parseFloat(x);
      y = parseFloat(y);

      // Perform calculations and display results
      var sum = x + y;
      var difference = x - y;
      var product = x * y;
      var quotient = x / y;

      alert("Sum (x + y): " + sum +
            "\nDifference (x - y): " + difference +
            "\nProduct (x * y): " + product +
            "\nQuotient (x / y): " + quotient);
    }

    // Call the function when the page is loaded
    window.onload = performCalculations;
  </script>
</body>

</html>
