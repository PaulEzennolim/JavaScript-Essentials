<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Point Numbers and Math Methods</title>
  <meta name="author" content="Paul Ezennolim">
</head>
<body>

  <script>
    // Function to generate a random floating-point number with 2 decimal places between min (inclusive) and max (exclusive)
    function getRandomFloat(min, max) {
      const randomFloat = Math.random() * (max - min) + min;
      return parseFloat(randomFloat.toFixed(2));
    }

    // Create an array of 10 random floating-point numbers with 2 decimal places in the range 0.0 to 10.0
    const randomNumbers = Array.from({ length: 10 }, () => getRandomFloat(0.0, 10.0));

    // Display the array on the HTML page
    document.write('<p>Random Numbers: ' + randomNumbers.join(', ') + '</p>');

    // Display results of using Math.floor(), Math.round(), and Math.ceil() for each number in the array
    randomNumbers.forEach((number) => {
      const floorResult = Math.floor(number);
      const roundResult = Math.round(number);
      const ceilResult = Math.ceil(number);

      document.write(`<p>Math.floor(${number}) = ${floorResult}, Math.round(${number}) = ${roundResult}, Math.ceil(${number}) = ${ceilResult}</p>`);
    });
  </script>

</body>
</html>
